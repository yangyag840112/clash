dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  listen: :7874
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  respect-rules: false
  prefer-h3: false
  nameserver:
    - 223.5.5.5
    - 223.6.6.6

unified-delay: true
port: 7890

proxies:
  - name: "MASQUE"
    type: masque
    server: 162.159.198.2
    port: 4443
    private-key: MHcCAQEEIBYX7Pq0D955Qo7tS62JoqhnVFJXwt2uq8wLBQqwHUQ6oAoGCCqGSM49AwEHoUQDQgAE0fR3Nh/wVIjHBC9aKXoo0X5CDM8kw78rZNVEwSJv/9f4ovtrN5NyLo6k84tuHBeGXaB4zV2+bwEGW8neGGaW2A==
    public-key: MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEIaU7MToJm9NKp8YfGxR6r+/h4mcG7SxI8tsW8OR1A5tv/zCzVbCRRh2t87/kxnP6lAy0lkr7qYwu+ox+k3dr6w==
    ip: 172.16.0.2
    mtu: 1280
    udp: true
    remote-dns-resolve: true
    dns: [ 1.1.1.1, 8.8.8.8 ]

proxy-groups:
  - name: "国外流量"
    type: select
    proxies:
      - "MASQUE"
      - "DIRECT"

rules:
  # 常见海外流媒体与网站走 MASQUE
  - DOMAIN-KEYWORD,youtube,国外流量
  - DOMAIN-KEYWORD,google,国外流量
  - DOMAIN-KEYWORD,netflix,国外流量
  - DOMAIN-KEYWORD,disney,国外流量
  - DOMAIN-KEYWORD,telegram,国外流量
  - DOMAIN-KEYWORD,twitter,国外流量
  - DOMAIN-KEYWORD,facebook,国外流量
  - DOMAIN-KEYWORD,instagram,国外流量
  - DOMAIN-KEYWORD,tiktok,国外流量
  # 局域网与国内直连
  - GEOIP,lan,DIRECT
  - GEOIP,cn,DIRECT
  # 漏网之鱼
  - MATCH,国外流量
