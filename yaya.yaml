dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  listen: :7874
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  respect-rules: false
  prefer-h3: false
  fake-ip-filter:
    # 去广告
    - RULE-SET,category-ads-all,real-ip
    - RULE-SET,adblock,real-ip
    # Bilibili
    - RULE-SET,bilibili,real-ip
    # Apple
    - RULE-SET,apple@cn,real-ip
    - RULE-SET,apple,real-ip
    # TikTok
    - RULE-SET,tiktok,fake-ip
    # Emby
    - RULE-SET,emby,fake-ip
    # Netflix
    - RULE-SET,netflix,fake-ip
    # Disney
    - RULE-SET,disney,fake-ip
    # Spotify
    - RULE-SET,spotify,fake-ip
    # Speedtest
    - RULE-SET,speedtest,real-ip
    # GitHub
    - RULE-SET,github,fake-ip
    # Telegram
    - RULE-SET,telegram,fake-ip
    # YouTube
    - RULE-SET,youtube,fake-ip
    # Google
    - RULE-SET,google,fake-ip
    # Twitter
    - RULE-SET,twitter,fake-ip
    # Instagram
    - RULE-SET,instagram,fake-ip
    # Facebook
    - RULE-SET,facebook,fake-ip
    # Steam
    - RULE-SET,steam@cn,real-ip
    - RULE-SET,steam,real-ip
    # Microsoft
    - RULE-SET,microsoft@cn,real-ip
    - RULE-SET,microsoft,real-ip
    # Xbox
    - RULE-SET,xbox,real-ip
    # PlayStation
    - RULE-SET,playstation,real-ip
    # Nintendo
    - RULE-SET,nintendo@cn,real-ip
    - RULE-SET,nintendo,real-ip
    # Porn
    - RULE-SET,category-porn,fake-ip
    # AI
    - RULE-SET,category-ai-!cn,fake-ip
    # 国外网站
    - RULE-SET,geolocation-!cn,fake-ip
    # 国内网站
    - RULE-SET,cn,real-ip
    # 漏网之鱼
    - MATCH,real-ip
  nameserver:
    - 223.5.5.5
    - 223.6.6.6

unified-delay: true
port: 7890

proxies:
  - name: "MASQUE"
    type: masque
    server: 162.159.198.2
    port: 4443
    private-key: MHcCAQEEIBYX7Pq0D955Qo7tS62JoqhnVFJXwt2uq8wLBQqwHUQ6oAoGCCqGSM49AwEHoUQDQgAE0fR3Nh/wVIjHBC9aKXoo0X5CDM8kw78rZNVEwSJv/9f4ovtrN5NyLo6k84tuHBeGXaB4zV2+bwEGW8neGGaW2A==
    public-key: MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEIaU7MToJm9NKp8YfGxR6r+/h4mcG7SxI8tsW8OR1A5tv/zCzVbCRRh2t87/kxnP6lAy0lkr7qYwu+ox+k3dr6w==
    ip: 172.16.0.2
    mtu: 1280
    udp: true
    remote-dns-resolve: true
    dns: [ 1.1.1.1, 8.8.8.8 ]

# 机场配置模块
provider_config: &provider_config {"type": "http","interval": 86400,"user-agent": "clash","health-check": {"enable": true,"url": "http://latency-test.skk.moe/endpoint","interval": 300}}

proxy-providers:
  机场1:
    url: "https://xxxxxxx" # 填入你真实的机场1订阅
    <<: *provider_config
    override:
      additional-prefix: "[机场1]"
  机场2:
    url: "https://xxxxx"   # 填入你真实的机场2订阅
    <<: *provider_config
    override:
      additional-prefix: "[机场2]"
  机场3:
    url: "https://xxxxxx"  # 填入你真实的机场3订阅
    <<: *provider_config
    override:
      additional-prefix: "[机场3]"

# 分组配置模块（已剔除所有国旗和表情）
standard_proxies: &standard_proxies {"type": "select", "proxies": ["MASQUE", "自动选择", "美国节点", "香港节点", "日本节点", "台湾节点", "新加坡节点", "韩国节点", "其他节点", "DIRECT"], "include-all": true}

# 节点配置模块
filter_proxies: &filter_proxies {"type": "url-test", "url": "http://latency-test.skk.moe/endpoint", "interval": 300, "tolerance": 100, "include-all": true}

